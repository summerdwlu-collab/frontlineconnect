<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontline Connect – Last War Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --lw-blue: #006AD6;
  --lw-blue-dark: #0051a8;
  --lw-blue-deep: #003d80;
  --lw-blue-glow: rgba(0,106,214,0.45);
  --lw-red: #FF5555;
  --lw-red-dark: #cc2222;
  --lw-red-glow: rgba(255,85,85,0.4);
  --bg-dark: #02111f;
  --bg-mid: #051a30;
  --bg-panel: rgba(5,26,48,0.9);
  --gold: #FFD700;
  --gold-glow: rgba(255,215,0,0.35);
  --text: #e8f0ff;
  --text-dim: #7a9cc0;
  --border: rgba(0,106,214,0.28);
  --white: #ffffff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Nunito Sans', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  overflow-x: hidden;
  font-size: 17px;
  line-height: 1.7;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--lw-blue); border-radius: 3px; }

/* ══════════ LANGUAGE SWITCHER ══════════ */
.lang-switcher {
  display: flex;
  align-items: center;
  gap: 2px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px;
}
.lang-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 1px;
  padding: 5px 14px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.22s;
  text-transform: uppercase;
  background: transparent;
  color: var(--text-dim);
}
.lang-btn.active {
  background: var(--lw-blue);
  color: #fff;
  box-shadow: 0 0 12px var(--lw-blue-glow);
}

/* ══════════ NAV ══════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  height: 68px;
  background: rgba(2,17,31,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(14px);
  gap: 16px;
}
.nav-logo {
  font-family: 'Nunito', sans-serif;
  font-size: 1.15rem;
  font-weight: 900;
  letter-spacing: 1px;
  color: #fff;
  white-space: nowrap;
}
.nav-logo .lw-red { color: var(--lw-red); }
.nav-logo .lw-blue { color: #5db3ff; }
.nav-links {
  display: flex; gap: 28px;
  flex: 1; justify-content: center;
}
.nav-links a {
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-dim);
  text-decoration: none;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: #fff; }
.nav-right { display: flex; align-items: center; gap: 12px; }

/* ══════════ HERO ══════════ */
#hero {
  position: relative;
  min-height: 100vh;
  display: flex; align-items: center;
  padding: 100px 0 0;
  overflow: hidden;
}

.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 100% 80% at 30% 50%, #003d80 0%, #001428 55%, var(--bg-dark) 100%);
}

/* Diagonal stripe accent */
.hero-stripe {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 55%;
  background: linear-gradient(135deg, transparent 45%, rgba(0,106,214,0.12) 45%);
  pointer-events: none;
}

/* Circle glow behind character */
.hero-circle-glow {
  position: absolute;
  right: 5%;
  top: 50%;
  transform: translateY(-50%);
  width: 580px; height: 580px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,106,214,0.25) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  position: relative; z-index: 2;
  display: flex; align-items: center;
  width: 100%; max-width: 1280px;
  margin: 0 auto;
  padding: 0 60px;
  gap: 40px;
}

.hero-text { flex: 1; max-width: 580px; }

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #5db3ff;
  margin-bottom: 20px;
  padding: 6px 16px;
  border: 1px solid rgba(0,106,214,0.4);
  border-radius: 20px;
  background: rgba(0,106,214,0.12);
}

.hero-title {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(3.2rem, 6.5vw, 6rem);
  font-weight: 900;
  line-height: 1.0;
  color: #fff;
  margin-bottom: 12px;
}
.hero-title .blue { color: #5db3ff; }
.hero-title .red  { color: var(--lw-red); }

.hero-subtitle {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.hero-desc {
  font-size: 1.12rem;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 36px;
  max-width: 520px;
}

.hero-cta { display: flex; gap: 16px; flex-wrap: wrap; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 40px;
  background: var(--lw-red);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 1.05rem;
  letter-spacing: 0.5px;
  text-decoration: none;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.22s;
  box-shadow: 0 4px 24px var(--lw-red-glow);
}
.btn-primary:hover {
  background: #ff3333;
  box-shadow: 0 6px 32px var(--lw-red-glow);
  transform: translateY(-2px);
}
.btn-outline {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 15px 32px;
  background: transparent;
  color: #5db3ff;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  text-decoration: none;
  border: 2px solid var(--lw-blue);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.22s;
}
.btn-outline:hover {
  background: rgba(0,106,214,0.15);
  border-color: #5db3ff;
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 0;
  align-items: stretch;
  margin-top: 48px;
  border-top: 1px solid var(--border);
  padding-top: 32px;
}
.stat {
  flex: 1;
  min-width: 0;
  text-align: center;
  display: grid;
  grid-template-rows: 64px 2.4em;
  align-items: end;
  justify-items: center;
  padding-right: 24px;
  border-right: 1px solid var(--border);
  margin-right: 24px;
}
.stat:last-child { border-right: none; margin-right: 0; }
.stat-num {
  font-family: 'Nunito', sans-serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: #fff;
  display: block;
  line-height: 1;
  width: 100%;
  min-height: 64px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.stat-num.red { color: var(--lw-red); }
.stat-num.blue { color: #5db3ff; }
.stat-num.gold { color: var(--gold); }
.stat-label {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
  text-align: center;
  width: 100%;
  min-height: 2.4em;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

.hero-character {
  flex-shrink: 0;
  width: 520px;
  position: relative;
  align-self: center;
}
.hero-character img {
  width: 100%;
  display: block;
}
@keyframes floatChar {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-14px); }
}

/* ══════════ SECTIONS ══════════ */
section { padding: 100px 24px; position: relative; }
.container { max-width: 1160px; margin: 0 auto; }

.section-eyebrow {
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #5db3ff;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 14px;
}
.section-eyebrow::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}
.section-title {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 16px;
  color: #fff;
}
.section-desc {
  font-size: 1.1rem;
  line-height: 1.8;
  color: var(--text-dim);
  max-width: 680px;
  margin-bottom: 52px;
}

/* ══════════ ABOUT ══════════ */
#about { background: var(--bg-mid); }

.rules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
  gap: 20px;
}
.rule-card {
  background: rgba(0,30,60,0.6);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px;
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  position: relative;
  overflow: hidden;
}
.rule-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--lw-blue), var(--lw-red));
  border-radius: 14px 14px 0 0;
}
.rule-card:hover {
  transform: translateY(-5px);
  border-color: rgba(0,106,214,0.5);
  box-shadow: 0 12px 40px rgba(0,106,214,0.2);
}
.rule-icon { font-size: 2.2rem; margin-bottom: 14px; }
.rule-card h3 {
  font-family: 'Nunito', sans-serif;
  font-size: 1.25rem;
  font-weight: 900;
  color: #fff;
  margin-bottom: 10px;
}
.rule-card p, .rule-card li {
  font-size: 1.02rem;
  line-height: 1.75;
  color: var(--text-dim);
}
.rule-card ul { padding-left: 18px; }
.rule-card li { margin-bottom: 6px; }

/* ══════════ FORMAT (SPLIT with character) ══════════ */
#format { background: var(--bg-dark); }

.format-inner {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 60px;
  align-items: start;
}
.format-char {
  position: sticky; top: 100px;
  text-align: center;
}
.format-char img {
  width: 100%;
  filter: drop-shadow(0 10px 40px rgba(255,85,85,0.3));
  animation: floatChar 5s ease-in-out infinite;
}

.timeline { position: relative; }
.timeline::before {
  content: '';
  position: absolute; left: 22px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--lw-blue), var(--lw-red), transparent);
}
.timeline-item {
  display: flex; gap: 28px;
  margin-bottom: 36px;
  padding-left: 68px;
  position: relative;
}
.t-dot {
  position: absolute; left: 10px; top: 10px;
  width: 28px; height: 28px;
  background: var(--lw-blue);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif;
  font-size: 0.75rem;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 14px var(--lw-blue-glow);
}
.t-content {
  background: rgba(0,30,60,0.6);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  flex: 1;
}
.t-tag {
  display: inline-block;
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 2px;
  padding: 3px 12px;
  background: rgba(0,106,214,0.18);
  border: 1px solid rgba(0,106,214,0.35);
  color: #5db3ff;
  border-radius: 20px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.t-content h3 {
  font-family: 'Nunito', sans-serif;
  font-size: 1.2rem;
  font-weight: 900;
  color: #fff;
  margin-bottom: 10px;
}
.t-content p { font-size: 1.02rem; color: var(--text-dim); margin-bottom: 10px; }
.t-content ul { padding-left: 18px; }
.t-content li { font-size: 1rem; color: var(--text-dim); margin-bottom: 5px; }

/* ══════════ REWARDS ══════════ */
#rewards {
  background: var(--bg-mid);
}
.rewards-top {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.reward-card {
  background: rgba(0,30,60,0.6);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 36px 28px;
  text-align: center;
  transition: transform 0.25s, box-shadow 0.25s;
  position: relative; overflow: hidden;
}
.reward-card:hover { transform: translateY(-6px); box-shadow: 0 14px 40px rgba(0,0,0,0.3); }
.reward-card.gold-card {
  border-color: rgba(255,215,0,0.3);
  background: linear-gradient(145deg, rgba(255,215,0,0.06), rgba(0,30,60,0.7));
}
.reward-card.gold-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.reward-icon { font-size: 2.8rem; margin-bottom: 14px; }
.reward-amount {
  font-family: 'Nunito', sans-serif;
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 24px var(--gold-glow);
  display: block; line-height: 1;
}
.reward-card h3 {
  font-family: 'Nunito', sans-serif;
  font-size: 1.2rem;
  font-weight: 900;
  color: #fff;
  margin: 10px 0 8px;
}
.reward-card p { font-size: 1rem; color: var(--text-dim); line-height: 1.65; }

/* ══════════ SUBMISSION ══════════ */
#submission { background: var(--bg-dark); }

.lb-box {
  background: rgba(0,30,60,0.6);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 36px;
  margin-bottom: 52px;
}
.lb-box h3 {
  font-family: 'Nunito', sans-serif;
  font-size: 1.35rem;
  font-weight: 900;
  color: #fff;
  margin-bottom: 8px;
}
.lb-box .lb-sub { font-size: 1rem; color: var(--text-dim); margin-bottom: 28px; }
.lb-row {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.lb-row:last-child { border-bottom: none; }
.lb-rank {
  font-family: 'Nunito', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  width: 44px; text-align: center;
}
.lb-rank.r1 { color: var(--gold); text-shadow: 0 0 18px var(--gold-glow); }
.lb-rank.r2 { color: #C0C0C0; }
.lb-rank.r3 { color: #CD7F32; }
.lb-avatar {
  width: 52px; height: 52px;
  background: var(--bg-mid);
  border: 1px dashed var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; flex-shrink: 0;
}
.lb-info { flex: 1; }
.lb-name { font-weight: 800; font-size: 1.05rem; color: #fff; }
.lb-uid { font-size: 0.82rem; color: var(--text-dim); }
.lb-quote { font-size: 0.88rem; color: var(--text-dim); font-style: italic; max-width: 200px; text-align: right; }
.lb-score { font-family: 'Nunito', sans-serif; font-size: 1.3rem; font-weight: 900; color: var(--lw-red); min-width: 70px; text-align: right; }

.vid-section-title {
  font-family: 'Nunito', sans-serif;
  font-size: 1.4rem;
  font-weight: 900;
  color: #fff;
  margin: 0 0 20px;
  display: flex; align-items: center; gap: 10px;
}
.materials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 18px;
}
.mat-card {
  background: rgba(0,30,60,0.6);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  display: flex; gap: 16px;
  flex-direction: column;
  transition: border-color 0.25s;
}
.mat-card:hover { border-color: rgba(255,85,85,0.4); }
.mat-num {
  font-family: 'Nunito', sans-serif;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--lw-red);
  opacity: 0.35;
  width: 40px; flex-shrink: 0; line-height: 1;
}
.mat-info h4 {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 1.05rem;
  color: #fff;
  margin-bottom: 6px;
}
.mat-info p { font-size: 0.98rem; color: var(--text-dim); line-height: 1.6; }
.dur-badge {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 1px;
  padding: 2px 10px;
  background: rgba(0,106,214,0.15);
  border: 1px solid rgba(0,106,214,0.3);
  color: #5db3ff;
  border-radius: 20px;
  margin-bottom: 8px;
}
.media-ph {
  background: rgba(0,20,40,0.8);
  border: 1px dashed var(--border);
  border-radius: 8px;
  height: 130px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-dim);
  font-size: 0.75rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  gap: 8px;
  margin-top: 12px;
}
.media-ph .ph-icon { font-size: 1.8rem; opacity: 0.35; }

/* ══════════ REPORT ══════════ */
#report {
  background: var(--bg-mid);
}
.report-box {
  background: rgba(0,30,60,0.6);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 52px;
  position: relative; overflow: hidden;
  margin-top: 48px;
}
.report-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--lw-blue), var(--lw-red));
}
.report-steps {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 36px;
  margin-bottom: 44px;
}
.r-step { text-align: center; }
.r-step-num {
  font-family: 'Nunito', sans-serif;
  font-size: 3.5rem;
  font-weight: 900;
  color: var(--lw-blue);
  opacity: 0.25;
  line-height: 1;
}
.r-step h4 {
  font-family: 'Nunito', sans-serif;
  font-size: 1.12rem;
  font-weight: 900;
  color: #fff;
  margin: 6px 0 8px;
}
.r-step p { font-size: 0.98rem; color: var(--text-dim); line-height: 1.65; }
.report-divider {
  border: none; border-top: 1px solid var(--border);
  margin-bottom: 36px;
}
.btn-report {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 40px;
  background: transparent;
  color: #5db3ff;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 1.05rem;
  text-decoration: none;
  border: 2px solid var(--lw-blue);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.22s;
}
.btn-report:hover {
  background: rgba(0,106,214,0.18);
  box-shadow: 0 0 24px var(--lw-blue-glow);
  transform: translateY(-2px);
}

/* ══════════ CONTACT ══════════ */
#contact {
  background: var(--bg-dark);
  padding: 80px 24px;
  text-align: center;
  border-top: 1px solid var(--border);
}
.contact-links { display: flex; gap: 16px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.contact-link {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.98rem;
  font-weight: 700;
  transition: all 0.22s;
}
.contact-icon {
  width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: currentColor;
  flex-shrink: 0;
}
.contact-icon svg {
  width: 18px;
  height: 18px;
  display: block;
}
.contact-link:hover {
  border-color: var(--lw-blue);
  color: #5db3ff;
  background: rgba(0,106,214,0.1);
}
.footer-copy {
  margin-top: 52px;
  font-size: 0.82rem;
  color: var(--text-dim);
  opacity: 0.6;
}

/* ══════════ MODAL ══════════ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 2000;
  align-items: center; justify-content: center;
  padding: 24px;
  backdrop-filter: blur(6px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-mid);
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 680px; width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
}
.modal::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--lw-blue), var(--lw-red));
  border-radius: 16px 16px 0 0;
}
.modal-header {
  padding: 32px 36px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-header h2 {
  font-family: 'Nunito', sans-serif;
  font-size: 1.5rem;
  font-weight: 900;
  color: #fff;
}
.modal-close {
  background: none; border: none;
  color: var(--text-dim);
  font-size: 1.5rem; line-height: 1;
  cursor: pointer; transition: color 0.2s;
}
.modal-close:hover { color: var(--lw-red); }
.modal-body { padding: 28px 36px; }
.modal-body > p { font-size: 1rem; color: var(--text-dim); margin-bottom: 24px; line-height: 1.7; }

.agr-item {
  display: flex; gap: 16px;
  padding: 20px 0;
  border-bottom: 1px solid var(--border);
}
.agr-item:last-of-type { border-bottom: none; }
.agr-check {
  width: 24px; height: 24px;
  border: 2px solid var(--lw-blue);
  border-radius: 6px;
  flex-shrink: 0;
  cursor: pointer;
  margin-top: 2px;
  appearance: none; -webkit-appearance: none;
  position: relative;
  transition: background 0.2s;
}
.agr-check:checked { background: var(--lw-blue); }
.agr-check:checked::after {
  content: '✓';
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 0.85rem; font-weight: 900;
}
.agr-text strong {
  display: block;
  font-size: 1rem;
  font-weight: 800;
  color: #fff;
  margin-bottom: 4px;
}
.agr-text span {
  font-size: 0.92rem;
  color: var(--text-dim);
  line-height: 1.65;
}
.agr-en { color: #5db3ff !important; font-style: italic; display: block; margin-top: 4px; }

.modal-footer {
  padding: 22px 36px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 14px;
}
.btn-cancel {
  padding: 12px 28px;
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.95rem;
  cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--lw-red); color: var(--lw-red); }
#proceedBtn {
  padding: 13px 36px;
  background: var(--lw-red);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem;
  cursor: pointer;
  opacity: 0.4;
  pointer-events: none;
  transition: all 0.25s;
}
#proceedBtn.ready { opacity: 1; pointer-events: auto; box-shadow: 0 4px 20px var(--lw-red-glow); }

/* ══════════ RESPONSIVE ══════════ */
@media(max-width: 900px) {
  nav { padding: 0 20px; }
  .nav-links { display: none; }
  .hero-inner { flex-direction: column-reverse; padding: 0 24px; text-align: center; }
  .hero-character { width: 280px; margin: 0 auto; }
  .hero-cta { justify-content: center; }
  .hero-stats { justify-content: center; }
  .format-inner { grid-template-columns: 1fr; }
  .format-char { display: none; }
  .rewards-top { grid-template-columns: 1fr; }
  .report-steps { grid-template-columns: 1fr; }
  .modal-body, .modal-header, .modal-footer { padding-left: 20px; padding-right: 20px; }
  .report-box { padding: 28px 20px; }
}

/* ══════════ ANIMATIONS ══════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }

.hero-eyebrow { animation: fadeUp 0.7s 0.2s both; }

/* lang hidden */

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="regModal">
  <div class="modal">
    <div class="modal-header">

      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

        <span data-lang="en" data-i18n="t084"></span>
      </p>
      <div class="agr-item">
        <input type="checkbox" class="agr-check" id="a1" onchange="checkAll()">
        <div class="agr-text">

          <span>
            <span data-lang="id" class="lang-show" data-i18n="t086"></span>
            <span data-lang="en" data-i18n="t086"></span>
            <span class="agr-en"><span data-lang="id" class="lang-show" data-i18n="t147"></span><span data-lang="en" data-i18n="t147"></span></span>
          </span>
        </div>
      </div>
      <div class="agr-item">
        <input type="checkbox" class="agr-check" id="a2" onchange="checkAll()">
        <div class="agr-text">

          <span>

          </span>
        </div>
      </div>
      <div class="agr-item">
        <input type="checkbox" class="agr-check" id="a3" onchange="checkAll()">
        <div class="agr-text">
          <strong><span data-lang="id" class="lang-show" data-i18n="t089"></span><span data-lang="en" data-i18n="t089"></span></strong>
          <span>

<script>
// -- LANG SYSTEM --
let currentLang = 'id';
let localeData = { id: {}, en: {} };

async function loadLocales() {
  const [idRes, enRes] = await Promise.all([
    fetch('locales/id.json'),
    fetch('locales/en.json')
  ]);

  localeData.id = await idRes.json();
  localeData.en = await enRes.json();
}

function applyI18n(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const value = localeData[lang]?.[key] || '';
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.value = value;
    } else {
      el.innerHTML = value;
    }
  });
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('[data-lang]').forEach(el => {
    el.classList.toggle('lang-show', el.dataset.lang === lang);
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(lang.toUpperCase()));
  });

  const navMap = {
    'about-nav': localeData[lang]['nav.about'],
    'format-nav': localeData[lang]['nav.format'],
    'rewards-nav': localeData[lang]['nav.rewards'],
    'sub-nav': localeData[lang]['nav.sub'],
    'report-nav': localeData[lang]['nav.report']
  };

  document.querySelectorAll('[data-nav]').forEach(el => {
    const key = el.dataset.nav;
    if (navMap[key]) el.textContent = navMap[key];
  });

  applyI18n(lang);
}

// -- MODAL --
function openModal() {
  document.getElementById('regModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('regModal').classList.remove('active');
  document.body.style.overflow = '';
}
function checkAll() {
  const all = ['a1','a2','a3','a4'].every(id => document.getElementById(id).checked);
  const btn = document.getElementById('proceedBtn');
  btn.classList.toggle('ready', all);
}
function goToForm() {
  window.open('https://forms.gle/GMnSvWqXNyPBsfbUA', '_blank');
  closeModal();
}
document.getElementById('regModal').addEventListener('click', e => {
  if (e.target === document.getElementById('regModal')) closeModal();
});

(async function init() {
  try {
    await loadLocales();
    setLang('id');
  } catch (err) {
    console.error('Failed to load locale files:', err);
    setLang('id');
  }
})();
</script>
